{% extends "base.html" %}

{% block title %}Reports — VendorIntelligence{% endblock %}

{% block content %}
<div class="space-y-6">

  <section class="flex items-start justify-between gap-4">
    <div>
      <h1 class="text-2xl font-semibold tracking-tight">Reports</h1>
      <p class="text-sm text-zinc-500 mt-1">Renewal-risk reports per vendor. Riskiest first; vendors currently being analyzed appear at the top.</p>
    </div>
    <form action="/runs" method="post" class="shrink-0">
      <button class="rounded bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 text-sm font-semibold whitespace-nowrap">
        Run analysis
      </button>
    </form>
  </section>

  {% include "_reports_table.html" %}

</div>
{% endblock %}
